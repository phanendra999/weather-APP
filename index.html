  <script>
        lucide.createIcons();

        // Chart
        const canvas = document.getElementById('aqi-chart');
        const ctx = canvas.getContext('2d');
        const data = [120, 135, 162, 148, 178, 155, 142, 130, 145, 160, 138, 142];
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        function drawChart() {
            const w = canvas.width = canvas.offsetWidth;
            const h = canvas.height = 220;
            const pad = {t:20,r:20,b:30,l:40};
            const cw = w - pad.l - pad.r;
            const ch = h - pad.t - pad.b;
            const max = 200, min = 80;

            ctx.clearRect(0,0,w,h);

            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 1;
            for(let i=0;i<=4;i++){
                const y = pad.t + (ch/4)*i;
                ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(w-pad.r,y); ctx.stroke();
            }

            // Line
            const grad = ctx.createLinearGradient(0,pad.t,0,h-pad.b);
            grad.addColorStop(0,'#10b981');
            grad.addColorStop(1,'#059669');
            ctx.strokeStyle = grad;
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            data.forEach((v,i)=>{
                const x = pad.l + (cw/(data.length-1))*i;
                const y = pad.t + ch - ((v-min)/(max-min))*ch;
                i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
            });
            ctx.stroke();

            // Dots
            data.forEach((v,i)=>{
                const x = pad.l + (cw/(data.length-1))*i;
                const y = pad.t + ch - ((v-min)/(max-min))*ch;
                ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2);
                ctx.fillStyle='#10b981'; ctx.fill();
            });

            // Labels
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '11px DM Sans';
            ctx.textAlign = 'center';
            months.forEach((m,i)=>{
                const x = pad.l + (cw/(data.length-1))*i;
                ctx.fillText(m, x, h - 8);
            });
        }
        drawChart();
        window.addEventListener('resize', drawChart);

        // Table
        const readings = [
            {date:'2026-07-09', aqi:142, pm25:58, status:'Moderate'},
            {date:'2026-07-08', aqi:138, pm25:52, status:'Moderate'},
            {date:'2026-07-07', aqi:160, pm25:67, status:'Unhealthy (SG)'},
            {date:'2026-07-06', aqi:145, pm25:61, status:'Unhealthy (SG)'},
            {date:'2026-07-05', aqi:130, pm25:48, status:'Moderate'},
        ];
        const tbody = document.getElementById('table-body');
        readings.forEach(r=>{
            const tr = document.createElement('tr');
            tr.className = 'border-b border-white/5';
            const statusColor = r.aqi > 150 ? '#f59e0b' : '#10b981';
            tr.innerHTML = `<td class="py-2 text-gray-300">${r.date}</td><td class="py-2 text-white font-medium">${r.aqi}</td><td class="py-2 text-gray-300">${r.pm25} µg/m³</td><td class="py-2"><span style="color:${statusColor}">${r.status}</span></td>`;
            tbody.appendChild(tr);
        });
    </script>
